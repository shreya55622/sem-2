<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Script</title>
</head>
<body>
    <script>
        // JS Variables.-- contains either value or not...
    
        var myName="Ankur"; // global
        document.write(myName);
        console.log(myName);

        var myName="Subhas"; // Redeclare and reassign
        console.log(myName);

        function demo(){
            var msg="Hello ABES";
            console.log(msg);
        }
        demo()
        //variable declaration using let and const

        let myNumber=12432423432;
        console.log(myNumber);

         myNumber=867876876; // no redclare but reassign
        console.log(myNumber);

        const myEmail="ankur123@gmail.com";
        console.log(myEmail);
        // myEmail="ankurt345@gmail.com" // no redclare and no reassign
        console.log(myEmail);
        // JS Execution
        // JS Scope
        // Variable declaration
        //diffrence among var, let and const
    </script>
</body>
</html>
